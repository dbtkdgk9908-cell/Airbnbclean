<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="청소관리">
<meta name="theme-color" content="#FF385C">
<title>청소 관리</title>
<link rel="manifest" id="manifestLink">
<script>
  // Inline manifest
  const manifest = {
    name: "청소 관리",
    short_name: "청소관리",
    description: "에어비앤비 청소 일정 관리",
    start_url: ".",
    display: "standalone",
    background_color: "#FF385C",
    theme_color: "#FF385C",
    orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23FF385C'/><text y='130' x='96' text-anchor='middle' font-size='120'>🧹</text></svg>", sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%23FF385C'/><text y='360' x='256' text-anchor='middle' font-size='320'>🧹</text></svg>", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  document.getElementById('manifestLink').href = url;
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --airbnb: #FF385C;
    --airbnb-dark: #E31C5F;
    --bg: #F7F7F7;
    --white: #FFFFFF;
    --text: #222222;
    --text-light: #717171;
    --border: #DDDDDD;
    --shadow: 0 2px 16px rgba(0,0,0,0.12);
    --shadow-hover: 0 4px 24px rgba(0,0,0,0.18);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ===================== 로그인 ===================== */
  .login-wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background: linear-gradient(135deg, #FF385C 0%, #E31C5F 100%);
  }
  .login-box {
    background:white; border-radius:24px; padding:40px 36px; width:100%; max-width:420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-logo .icon { font-size:48px; }
  .login-logo h1 { font-size:24px; font-weight:900; color:var(--airbnb); margin-top:8px; }
  .login-logo p { font-size:14px; color:var(--text-light); margin-top:4px; }
  .role-btns { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; margin-bottom:20px; }
  .role-btn {
    padding:12px 6px; border-radius:12px; border:2px solid var(--border);
    background:white; cursor:pointer; font-size:13px; font-weight:700;
    font-family:inherit; color:var(--text-light); transition:all 0.2s; text-align:center;
  }
  .role-btn.selected { border-color:var(--airbnb); color:var(--airbnb); background:#fff0f2; }
  .pw-input {
    width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:12px;
    font-size:16px; font-family:inherit; outline:none; margin-bottom:16px;
    transition:border-color 0.2s;
  }
  .pw-input:focus { border-color:var(--airbnb); }
  .login-btn {
    width:100%; padding:16px; background:var(--airbnb); color:white; border:none;
    border-radius:12px; font-size:16px; font-weight:700; font-family:inherit;
    cursor:pointer; transition:background 0.2s;
  }
  .login-btn:hover { background:var(--airbnb-dark); }
  .login-error { color:var(--airbnb); font-size:13px; text-align:center; margin-top:10px; display:none; }

  /* ===================== 공통 ===================== */
  .page { display:none; }

  /* ===================== 관리자 페이지 ===================== */
  .btn { padding:10px 20px; border-radius:24px; border:none; cursor:pointer; font-size:14px; font-weight:600; font-family:inherit; transition:all 0.2s; }
  .btn-primary { background:var(--airbnb); color:white; }
  .btn-primary:hover { background:var(--airbnb-dark); }
  .btn-outline { background:white; color:var(--text); border:1px solid var(--border); }
  .btn-outline:hover { background:var(--bg); }
  .btn-sm { padding:6px 14px; font-size:13px; }

  #adminPage main { max-width:1200px; margin:0 auto; padding:32px 24px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card { background:white; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); text-align:center; }
  .stat-number { font-size:32px; font-weight:700; color:var(--airbnb); }
  .stat-label { font-size:13px; color:var(--text-light); margin-top:4px; }
  .region-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .region-tab { padding:10px 20px; border-radius:24px; border:2px solid var(--border); background:white; cursor:pointer; font-size:14px; font-weight:600; font-family:inherit; color:var(--text-light); transition:all 0.2s; }
  .region-tab.active { border-color:var(--airbnb); color:var(--airbnb); background:#fff0f2; }
  .filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
  .filter-tabs { display:flex; background:white; border-radius:24px; padding:4px; border:1px solid var(--border); gap:2px; }
  .tab { padding:8px 18px; border-radius:20px; border:none; background:transparent; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-light); transition:all 0.2s; font-family:inherit; }
  .tab.active { background:var(--airbnb); color:white; }
  .date-filter { padding:10px 16px; border-radius:24px; border:1px solid var(--border); background:white; font-size:14px; font-family:inherit; color:var(--text); outline:none; }
  .schedules { display:grid; gap:16px; }
  .schedule-card { background:white; border-radius:var(--radius); padding:20px 24px; box-shadow:var(--shadow); display:flex; align-items:center; gap:20px; transition:all 0.2s; cursor:pointer; border:2px solid transparent; }
  .schedule-card:hover { box-shadow:var(--shadow-hover); border-color:#ffb3c1; transform:translateY(-2px); }
  .date-block { background:var(--airbnb); color:white; border-radius:12px; padding:12px 16px; text-align:center; min-width:64px; flex-shrink:0; }
  .date-block .month { font-size:11px; font-weight:600; opacity:0.9; }
  .date-block .day { font-size:28px; font-weight:700; line-height:1; }
  .date-block .weekday { font-size:11px; opacity:0.9; }
  .card-info { flex:1; }
  .property-name { font-size:17px; font-weight:700; margin-bottom:4px; }
  .property-sub { font-size:12px; color:var(--text-light); margin-bottom:6px; }
  .region-badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; margin-bottom:8px; }
  .region-합정역 { background:#FEF3C7; color:#92400E; }
  .region-공덕역 { background:#DBEAFE; color:#1E40AF; }
  .region-서울역 { background:#D1FAE5; color:#065F46; }
  .region-기타 { background:#F3F4F6; color:#374151; }
  .card-meta { display:flex; align-items:center; gap:12px; font-size:13px; color:var(--text-light); }
  .memo { font-size:13px; color:var(--text-light); background:var(--bg); padding:6px 12px; border-radius:8px; display:inline-block; margin-top:6px; }
  .card-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  .status-badge { padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600; }
  .status-pending { background:#FFF3CD; color:#856404; }
  .status-done { background:#D1FAE5; color:#065F46; }
  .priority-high { background:#FEE2E2; color:#991B1B; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600; }
  .empty-state { text-align:center; padding:80px 20px; color:var(--text-light); }
  .empty-state .icon { font-size:48px; margin-bottom:16px; }
  .empty-state h3 { font-size:18px; font-weight:600; margin-bottom:8px; color:var(--text); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border-radius:24px; padding:32px; width:100%; max-width:540px; max-height:90vh; overflow-y:auto; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .modal-title { font-size:20px; font-weight:700; }
  .close-btn { width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:white; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
  .form-group { margin-bottom:18px; }
  .form-label { display:block; font-size:13px; font-weight:600; margin-bottom:8px; }
  .form-input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:12px; font-size:15px; font-family:inherit; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--airbnb); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .property-card { background:var(--bg); border-radius:12px; padding:16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .property-card-info { flex:1; }
  .property-display-name { font-weight:700; font-size:15px; }
  .property-airbnb-name { font-size:12px; color:var(--text-light); margin-top:2px; }
  .section-divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
  .select-bar { display:none; align-items:center; justify-content:space-between; background:white; border-radius:24px; padding:12px 20px; box-shadow:var(--shadow); margin-bottom:16px; border:2px solid var(--airbnb); }
  .select-bar.visible { display:flex; }
  .select-bar-left { display:flex; align-items:center; gap:12px; font-size:14px; font-weight:600; }
  .select-bar-right { display:flex; gap:8px; }
  .schedule-card.selectable { cursor:pointer; }
  .schedule-card.selected { border-color:var(--airbnb); background:#fff8f9; }
  .card-checkbox { width:22px; height:22px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; background:white; }
  .schedule-card.selected .card-checkbox { background:var(--airbnb); border-color:var(--airbnb); color:white; }
  .btn-select-mode { background:white; color:var(--text); border:1px solid var(--border); }
  .btn-select-mode.active { background:#fff0f2; color:var(--airbnb); border-color:var(--airbnb); }
  .btn-danger { background:#FF385C; color:white; }
  .btn-danger:hover { background:#c0392b; }

  /* ===================== 담당자 페이지 ===================== */
  #staffPage header {
    background:white; border-bottom:1px solid var(--border);
    padding:0 20px; position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between; height:60px;
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .region-badge-header { padding:6px 14px; border-radius:20px; font-size:14px; font-weight:700; background:var(--airbnb); color:white; }
  .logout-btn { padding:8px 16px; border-radius:20px; border:1px solid var(--border); background:white; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  #staffPage main { max-width:800px; margin:0 auto; padding:24px 16px; }
  .today-section { background: linear-gradient(135deg, #FF385C, #E31C5F); border-radius:20px; padding:24px; margin-bottom:24px; color:white; }
  .today-section h2 { font-size:13px; font-weight:600; opacity:0.85; margin-bottom:4px; }
  .today-count { font-size:48px; font-weight:900; line-height:1; }
  .today-count span { font-size:20px; font-weight:500; opacity:0.85; }
  .today-cards { margin-top:16px; display:grid; gap:10px; }
  .today-card { background:rgba(255,255,255,0.15); border-radius:12px; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; backdrop-filter:blur(10px); }
  .today-card-name { font-size:16px; font-weight:700; }
  .today-card-time { font-size:13px; opacity:0.85; margin-top:2px; }
  .today-card-status { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
  .today-card-status.pending { background:rgba(255,255,255,0.25); color:white; }
  .today-card-status.done { background:white; color:var(--airbnb); }
  .tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:2px solid var(--border); }
  .tab-btn { padding:12px 24px; border:none; background:none; font-size:15px; font-weight:600; cursor:pointer; color:var(--text-light); border-bottom:3px solid transparent; margin-bottom:-2px; font-family:inherit; transition:all 0.2s; }
  .tab-btn.active { color:var(--airbnb); border-bottom-color:var(--airbnb); font-weight:700; }
  .week-nav { display:flex; align-items:center; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
  .day-btn { flex-shrink:0; padding:10px 14px; border-radius:20px; border:1px solid var(--border); background:white; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit; color:var(--text-light); transition:all 0.2s; text-align:center; min-width:64px; }
  .day-btn.active { background:var(--airbnb); color:white; border-color:var(--airbnb); }
  .day-btn.today-day { border-color:var(--airbnb); color:var(--airbnb); }
  .day-btn .day-name { font-size:11px; display:block; }
  .day-btn .day-num { font-size:16px; font-weight:700; display:block; }
  .schedule-list { display:grid; gap:12px; }
  .s-card { background:white; border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); display:flex; align-items:center; gap:16px; border:2px solid transparent; transition:all 0.2s; }
  .s-card.is-today { border-color:var(--airbnb); background:#FFF0F2; }
  .s-card.is-today-checkin { border-color:#4F46E5; background:#EEF2FF; }
  .s-card.is-done { opacity:0.6; }
  .s-date-block { color:white; border-radius:10px; padding:10px 12px; text-align:center; min-width:56px; flex-shrink:0; }
  .s-date-block .month { font-size:10px; font-weight:600; opacity:0.9; }
  .s-date-block .day { font-size:24px; font-weight:700; line-height:1; }
  .s-date-block .weekday { font-size:10px; opacity:0.9; }
  .s-card-info { flex:1; }
  .s-card-name { font-size:16px; font-weight:700; margin-bottom:4px; }
  .s-card-time { font-size:13px; color:var(--airbnb); font-weight:600; }
  .s-card-time-blue { font-size:13px; color:#4F46E5; font-weight:600; }
  .s-towel { font-size:22px; font-weight:900; color:#856404; margin-top:6px; }
  .done-btn { padding:10px 16px; border-radius:20px; border:none; cursor:pointer; font-size:13px; font-weight:700; font-family:inherit; flex-shrink:0; transition:all 0.2s; }
  .done-btn.pending { background:#FFF3CD; color:#856404; }
  .done-btn.done { background:#D1FAE5; color:#065F46; }
  .s-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
</style>
</head>
<body>

<!-- 앱 설치 배너 -->
<div id="installBanner" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:white;border-radius:16px;padding:16px 20px;box-shadow:0 4px 24px rgba(0,0,0,0.2);
  z-index:9999;align-items:center;gap:12px;max-width:340px;width:calc(100%-32px);">
  <span style="font-size:28px;">🧹</span>
  <div style="flex:1;">
    <div style="font-size:14px;font-weight:700;">앱으로 설치하기</div>
    <div style="font-size:12px;color:#717171;">홈 화면에 추가하면 더 편해요</div>
  </div>
  <button onclick="installApp()" style="background:#FF385C;color:white;border:none;border-radius:10px;
    padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">설치</button>
  <button onclick="dismissInstall()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#717171;">×</button>
</div>

<!-- ========== 로그인 ========== -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🧹</div>
      <h1>청소 관리</h1>
      <p>역할을 선택하고 로그인하세요</p>
    </div>
    <div class="role-btns">
      <button class="role-btn" onclick="selectRole('admin', this)">⚙️<br>관리자</button>
      <button class="role-btn" onclick="selectRole('합정역', this)">🟡<br>합정역</button>
      <button class="role-btn" onclick="selectRole('공덕역', this)">🔵<br>공덕역</button>
      <button class="role-btn" onclick="selectRole('서울역', this)">🟢<br>서울역</button>
    </div>
    <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError">역할을 선택하거나 비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- ========== 관리자 페이지 ========== -->
<div class="page" id="adminPage">
  <header>
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="var(--airbnb)"><path d="M16 1C7.716 1 1 7.716 1 16s6.716 15 15 15 15-6.716 15-15S24.284 1 16 1zm0 4c2.107 0 4.073.554 5.774 1.525L7.525 21.774A10.962 10.962 0 015 16C5 9.925 9.925 5 16 5zm0 22c-2.107 0-4.073-.554-5.774-1.525l14.249-14.249A10.962 10.962 0 0127 16c0 6.075-4.925 11-11 11z"/></svg>
      청소 관리
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline btn-select-mode" id="selectModeBtn" onclick="toggleSelectMode()">☑️ 선택</button>
      <button class="btn btn-outline" onclick="openPropertyModal()">🏠 숙소 관리</button>
      <button class="btn btn-primary" onclick="openAddModal()">+ 일정 추가</button>
      <button class="btn btn-outline" onclick="doLogout()">로그아웃</button>
    </div>
  </header>
  <main>
    <div class="stats">
      <div class="stat-card"><div class="stat-number" id="stat-today">0</div><div class="stat-label">오늘 청소</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-pending">0</div><div class="stat-label">대기중</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-done">0</div><div class="stat-label">완료</div></div>
      <div class="stat-card"><div class="stat-number" id="stat-properties">0</div><div class="stat-label">등록 숙소</div></div>
    </div>
    <div style="display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border);">
      <button id="tab-clean" onclick="switchTab('clean')" style="padding:12px 28px;border:none;background:none;font-size:15px;font-weight:700;cursor:pointer;color:var(--airbnb);border-bottom:3px solid var(--airbnb);margin-bottom:-2px;font-family:inherit;">🧹 청소</button>
      <button id="tab-checkin" onclick="switchTab('checkin')" style="padding:12px 28px;border:none;background:none;font-size:15px;font-weight:600;cursor:pointer;color:var(--text-light);border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit;">🛎️ 체크인</button>
    </div>
    <div id="section-clean">
      <div class="region-tabs">
        <button class="region-tab active" onclick="filterRegion('all', this)">🏙️ 전체</button>
        <button class="region-tab" onclick="filterRegion('합정역', this)">🟡 합정역</button>
        <button class="region-tab" onclick="filterRegion('공덕역', this)">🔵 공덕역</button>
        <button class="region-tab" onclick="filterRegion('서울역', this)">🟢 서울역</button>
      </div>
      <div class="filter-bar">
        <div class="filter-tabs">
          <button class="tab active" onclick="filterStatus('all', this)">전체</button>
          <button class="tab" onclick="filterStatus('pending', this)">대기</button>
          <button class="tab" onclick="filterStatus('done', this)">완료</button>
        </div>
        <input type="date" class="date-filter" id="dateFilter" onchange="renderSchedules()">
        <button class="btn btn-outline" onclick="clearFilters()">초기화</button>
      </div>
      <div class="select-bar" id="selectBar">
        <div class="select-bar-left">
          <span id="selectCount">0개 선택됨</span>
          <button class="btn btn-outline btn-sm" onclick="selectAll()">전체 선택</button>
          <button class="btn btn-outline btn-sm" onclick="deselectAll()">선택 해제</button>
        </div>
        <div class="select-bar-right">
          <button class="btn btn-danger btn-sm" onclick="deleteSelected()">🗑️ 선택 삭제</button>
        </div>
      </div>
      <div class="schedules" id="scheduleList"></div>
    </div>
    <div id="section-checkin" style="display:none;">
      <div class="region-tabs">
        <button class="region-tab active" onclick="filterCheckinRegion('all', this)">🏙️ 전체</button>
        <button class="region-tab" onclick="filterCheckinRegion('합정역', this)">🟡 합정역</button>
        <button class="region-tab" onclick="filterCheckinRegion('공덕역', this)">🔵 공덕역</button>
        <button class="region-tab" onclick="filterCheckinRegion('서울역', this)">🟢 서울역</button>
      </div>
      <div class="filter-bar">
        <div class="filter-tabs">
          <button class="tab active" onclick="filterCheckinStatus('all', this)">전체</button>
          <button class="tab" onclick="filterCheckinStatus('pending', this)">대기</button>
          <button class="tab" onclick="filterCheckinStatus('done', this)">완료</button>
        </div>
        <input type="date" class="date-filter" id="checkinDateFilter" onchange="renderCheckins()">
      </div>
      <div class="schedules" id="checkinList"></div>
    </div>
  </main>
</div>

<!-- ========== 담당자 페이지 ========== -->
<div class="page" id="staffPage">
  <header>
    <div class="header-left">

<div class="modal-overlay" id="propertyModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">숙소 관리</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle">일정 상세</div>
      <button class="close-btn" onclick="closeModal('detailModal')">×</button>
    </div>
    <div id="detailContent"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, get, push, remove, update, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const app = initializeApp({ databaseURL: "https://airbnbclean-4c10f-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

const PASSWORDS = { admin:'1234', '합정역':'1234', '공덕역':'1234', '서울역':'1234' };
const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const days = ['일','월','화','수','목','금','토'];

let properties = {}, schedules = {}, checkins = {};
let currentStatus = 'all', currentRegion = 'all';
let currentCheckinStatus = 'all', currentCheckinRegion = 'all';
let currentTab = 'clean';
let selectMode = false, selectedIds = new Set();
let staffRegion = '';
let staffTab = 'clean';
let staffSelectedDate = new Date().toISOString().split('T')[0];
const todayStr = new Date().toISOString().split('T')[0];

// PWA 서비스워커 등록
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'clean-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// 설치 프롬프트
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});
window.installApp = function() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').style.display = 'none';
    });
  }
};
window.dismissInstall = function() {
  document.getElementById('installBanner').style.display = 'none';
};
let selectedRole = '';
window.selectRole = function(role, btn) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
};

window.doLogin = function() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginError');
  if (!selectedRole || PASSWORDS[selectedRole] !== pw) {
    err.style.display = 'block'; return;
  }
  err.style.display = 'none';
  document.getElementById('loginWrap').style.display = 'none';

  if (selectedRole === 'admin') {
    document.getElementById('adminPage').style.display = 'block';
    initAdmin();
  } else {
    staffRegion = selectedRole;
    document.getElementById('staffRegionBadge').textContent = staffRegion;
    document.getElementById('staffPage').style.display = 'block';
    initStaff();
  }
};

window.doLogout = function() {
  selectedRole = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('staffPage').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
};

// ===== Firebase =====
function initFirebase() {
  onValue(ref(db, 'properties'), snap => {
    properties = snap.val() || {};
    window.properties = properties;
    updatePropertySelects();
    renderPropertyList();
    updateStats();
    renderSchedules();
    renderCheckins();
    renderStaff();
  });
  onValue(ref(db, 'schedules'), snap => {
    schedules = snap.val() || {};
    window.schedules = schedules;
    renderSchedules();
    updateStats();
    renderStaff();
  });
  onValue(ref(db, 'checkins'), snap => {
    checkins = snap.val() || {};
    renderCheckins();
    renderStaff();
  });
}

let firebaseInited = false;
function initAdmin() {
  if (!firebaseInited) { initFirebase(); firebaseInited = true; }
}
function initStaff() {
  if (!firebaseInited) { initFirebase(); firebaseInited = true; }
  renderStaff();
}

// ===== 관리자 =====
window.updateStats = function() {
  const today = new Date().toISOString().split('T')[0];
  const all = Object.entries(schedules);
  const filtered = currentRegion === 'all' ? all : all.filter(([_,s]) => {
    const p = properties[s.propertyId]; return (p?.region || '기타') === currentRegion;
  });
  const propCount = currentRegion === 'all' ? Object.keys(properties).length
    : Object.values(properties).filter(p => p.region === currentRegion).length;
  const vals = filtered.map(([_,s]) => s);
  document.getElementById('stat-today').textContent   = vals.filter(s => s.date === today).length;
  document.getElementById('stat-pending').textContent = vals.filter(s => s.status === 'pending').length;
  document.getElementById('stat-done').textContent    = vals.filter(s => s.status === 'done').length;
  document.getElementById('stat-properties').textContent = propCount;
};

window.updatePropertySelects = function() {
  const opts = Object.entries(properties).map(([id, p]) =>
    `<option value="${id}">${p.name} (${p.region || '기타'})</option>`).join('');
  document.getElementById('scheduleProperty').innerHTML = '<option value="">숙소 선택</option>' + opts;
};

window.renderPropertyList = function() {
  const list = document.getElementById('propertyList');
  if (!list) return;
  const items = Object.entries(properties);
  if (!items.length) { list.innerHTML = '<p style="color:#717171;text-align:center;padding:20px;">등록된 숙소가 없어요</p>'; return; }
  const regions = ['합정역','공덕역','서울역','기타'];
  let html = '';
  regions.forEach(region => {
    const ri = items.filter(([_, p]) => (p.region || '기타') === region);
    if (!ri.length) return;
    html += `<div style="font-size:13px;font-weight:700;color:var(--text-light);margin:12px 0 8px;">${region}</div>`;
    html += ri.map(([id, p]) => `
      <div class="property-card" style="margin-bottom:8px;">
        <div class="property-card-info">
          <div class="property-display-name">${p.name}</div>
          ${p.airbnbName ? `<div class="property-airbnb-name">에어비앤비: ${p.airbnbName.substring(0,40)}...</div>` : ''}
        </div>
        <button onclick="deleteProperty('${id}')" style="background:none;border:none;cursor:pointer;color:#FF385C;font-size:20px;flex-shrink:0;">×</button>
      </div>`).join('');
  });
  list.innerHTML = html;
};

window.renderSchedules = function() {
  const list = document.getElementById('scheduleList');
  if (!list) return;
  const dateFilter = document.getElementById('dateFilter')?.value;
  const today2 = new Date().toISOString().split('T')[0];
  let items = Object.entries(schedules).filter(([_,s]) => s.date >= today2);
  if (currentStatus !== 'all') items = items.filter(([_,s]) => s.status === currentStatus);
  if (currentRegion !== 'all') items = items.filter(([_,s]) => { const p = properties[s.propertyId]; return (p?.region || '기타') === currentRegion; });
  if (dateFilter) items = items.filter(([_,s]) => s.date === dateFilter);
  items.sort((a,b) => a[1].date?.localeCompare(b[1].date));
  if (!items.length) { list.innerHTML = `<div class="empty-state"><div class="icon">🧹</div><h3>청소 일정이 없어요</h3></div>`; return; }
  list.innerHTML = items.map(([id, s]) => {
    const d = new Date(s.date + 'T00:00:00');
    const p = properties[s.propertyId];
    const propName = p?.name || '알 수 없는 숙소';
    const region = p?.region || '기타';
    const isSelected = selectedIds.has(id);
    const isHapjeong = region === '합정역';
    const checkoutTime = isHapjeong ? '12:00' : '11:00';
    const checkinTime  = isHapjeong ? '16:00' : '15:00';
    return `
      <div class="schedule-card ${selectMode ? 'selectable' : ''} ${isSelected ? 'selected' : ''}" data-id="${id}"
           onclick="${selectMode ? `toggleSelect('${id}', this)` : `openDetail('${id}')`}">
        ${selectMode ? `<div class="card-checkbox" style="font-size:14px;font-weight:700;color:white;">${isSelected ? '✓' : ''}</div>` : ''}
        <div class="date-block">
          <div class="month">${months[d.getMonth()]}</div>
          <div class="day">${d.getDate()}</div>
          <div class="weekday">${days[d.getDay()]}요일</div>
        </div>
        <div class="card-info">
          <div class="region-badge region-${region}">${region}</div>
          <div class="property-name">${propName}</div>
          <div class="card-meta">
            <span>🧹 ${checkoutTime} ~ ${checkinTime}</span>
            ${s.checkin ? `<span>➡️ 체크인: ${s.checkin}</span>` : ''}
            ${s.staff ? `<span>👤 ${s.staff}</span>` : ''}
          </div>
          ${s.memo ? `<div class="memo">${s.memo}</div>` : ''}
        </div>
        <div class="card-right">
          <span class="status-badge ${s.status === 'done' ? 'status-done' : 'status-pending'}">${s.status === 'done' ? '✅ 완료' : '⏳ 대기'}</span>
          ${s.priority === 'high' ? '<span class="priority-high">🔴 우선순위 높음</span>' : ''}
        </div>
      </div>`;
  }).join('');
};

window.renderCheckins = function() {
  const list = document.getElementById('checkinList');
  if (!list) return;
  const dateFilter = document.getElementById('checkinDateFilter')?.value;
  const today2 = new Date().toISOString().split('T')[0];
  let items = Object.entries(checkins).filter(([_,s]) => s.date >= today2);
  if (currentCheckinStatus !== 'all') items = items.filter(([_,s]) => s.status === currentCheckinStatus);
  if (currentCheckinRegion !== 'all') items = items.filter(([_,s]) => { const p = properties[s.propertyId]; return (p?.region || '기타') === currentCheckinRegion; });
  if (dateFilter) items = items.filter(([_,s]) => s.date === dateFilter);
  items.sort((a,b) => a[1].date?.localeCompare(b[1].date));
  if (!items.length) { list.innerHTML = `<div class="empty-state"><div class="icon">🛎️</div><h3>체크인 일정이 없어요</h3></div>`; return; }
  list.innerHTML = items.map(([id, s]) => {
    const d = new Date(s.date + 'T00:00:00');
    const p = properties[s.propertyId];
    const propName = p?.name || '알 수 없는 숙소';
    const region = p?.region || '기타';
    const isHapjeong = region === '합정역';
    const checkinTime = isHapjeong ? '16:00' : '15:00';
    return `
      <div class="schedule-card" onclick="openCheckinDetail('${id}')">
        <div class="date-block" style="background:#4F46E5;">
          <div class="month">${months[d.getMonth()]}</div>
          <div class="day">${d.getDate()}</div>
          <div class="weekday">${days[d.getDay()]}요일</div>
        </div>
        <div class="card-info">
          <div class="region-badge region-${region}">${region}</div>
          <div class="property-name">${propName}</div>
          <div class="card-meta"><span>🛎️ ${checkinTime}까지</span><span>👥 ${s.guests||1}명 / ${s.nights||1}박</span></div>
          <div class="memo">🛁 수건 ${s.towels||2}개</div>
        </div>
        <div class="card-right">
          <span class="status-badge ${s.status === 'done' ? 'status-done' : 'status-pending'}">${s.status === 'done' ? '✅ 완료' : '⏳ 대기'}</span>
        </div>
      </div>`;
  }).join('');
};

// ===== 담당자 =====
window.renderStaff = function() {
  if (!staffRegion) return;
  renderStaffToday();
  renderStaffWeekNav();
  renderStaffList();
};

function getStaffProps() {
  return Object.entries(properties).filter(([_,p]) => p.region === staffRegion).map(([id]) => id);
}

function getWeekDates() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

window.staffSwitchTab = function(tab) {
  staffTab = tab;
  document.getElementById('staffTabClean').classList.toggle('active', tab === 'clean');
  document.getElementById('staffTabCheckin').classList.toggle('active', tab === 'checkin');
  renderStaff();
};

window.staffSelectDate = function(d) {
  staffSelectedDate = d;
  renderStaffWeekNav();
  renderStaffList();
};

function renderStaffToday() {
  const pids = getStaffProps();
  const isHapjeong = staffRegion === '합정역';
  const checkoutTime = isHapjeong ? '12:00' : '11:00';
  const checkinTime  = isHapjeong ? '16:00' : '15:00';
  const todayClean   = Object.entries(schedules).filter(([_,s]) => s.date === todayStr && pids.includes(s.propertyId));
  const todayCheckin = Object.entries(checkins).filter(([_,s]) => s.date === todayStr && pids.includes(s.propertyId));
  document.getElementById('todayCount').textContent = todayClean.length + todayCheckin.length;
  const cleanHTML = todayClean.length ? `
    <div style="font-size:11px;font-weight:700;opacity:0.7;margin-top:8px;margin-bottom:4px;letter-spacing:1px;">🧹 청소</div>
    ${todayClean.map(([id,s]) => {
      const name = properties[s.propertyId]?.name || '알 수 없는 숙소';
      return `<div class="today-card">
        <div><div class="today-card-name">${name}</div><div class="today-card-time">🧹 ${checkoutTime} ~ ${checkinTime}</div></div>
        <button class="today-card-status ${s.status==='done'?'done':'pending'}" onclick="staffToggle('${id}','clean','${s.status}')">
          ${s.status==='done'?'✅ 완료':'⏳ 대기'}</button>
      </div>`;
    }).join('')}` : '';
  const checkinHTML = todayCheckin.length ? `
    <div style="font-size:11px;font-weight:700;opacity:0.7;margin-top:12px;margin-bottom:4px;letter-spacing:1px;">🛎️ 체크인</div>
    ${todayCheckin.map(([id,s]) => {
      const name = properties[s.propertyId]?.name || '알 수 없는 숙소';
      return `<div class="today-card">
        <div><div class="today-card-name">${name}</div><div class="today-card-time">🛎️ ${checkinTime}까지 · 🛁 수건 ${s.towels||2}개</div></div>
        <button class="today-card-status ${s.status==='done'?'done':'pending'}" onclick="staffToggle('${id}','checkin','${s.status}')">
          ${s.status==='done'?'✅ 완료':'⏳ 대기'}</button>
      </div>`;
    }).join('')}` : '';
  document.getElementById('todayCards').innerHTML = (cleanHTML + checkinHTML) || '<div style="opacity:0.7;font-size:14px;margin-top:8px;">오늘 일정 없음</div>';
}

function renderStaffWeekNav() {
  const nav = document.getElementById('weekNav');
  if (!nav) return;
  nav.innerHTML = getWeekDates().map(d => {
    const dt = new Date(d + 'T00:00:00');
    const isToday = d === todayStr;
    const isSelected = d === staffSelectedDate;
    return `<button class="day-btn ${isSelected?'active':''} ${isToday&&!isSelected?'today-day':''}" onclick="staffSelectDate('${d}')">
      <span class="day-name">${days[dt.getDay()]}${isToday?' 오늘':''}</span>
      <span class="day-num">${dt.getDate()}</span>
    </button>`;
  }).join('');
}

function renderStaffList() {
  const list = document.getElementById('staffList');
  if (!list) return;
  const pids = getStaffProps();
  const isHapjeong = staffRegion === '합정역';
  const checkoutTime = isHapjeong ? '12:00' : '11:00';
  const checkinTime  = isHapjeong ? '16:00' : '15:00';
  const source = staffTab === 'clean' ? schedules : checkins;
  const items = Object.entries(source).filter(([_,s]) => pids.includes(s.propertyId) && s.date === staffSelectedDate);
  items.sort((a,b) => a[1].date?.localeCompare(b[1].date));
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">${staffTab==='clean'?'🧹':'🛎️'}</div><p>이 날 일정이 없어요</p></div>`;
    return;
  }
  list.innerHTML = items.map(([id,s]) => {
    const d = new Date(s.date + 'T00:00:00');
    const p = properties[s.propertyId];
    const name = p?.name || '알 수 없는 숙소';
    const isToday = s.date === todayStr;
    const isDone = s.status === 'done';
    if (staffTab === 'clean') {
      return `<div class="s-card ${isToday?'is-today':''} ${isDone?'is-done':''}">
        <div class="s-date-block" style="background:${isDone?'#ccc':'var(--airbnb)'}">
          <div class="month">${months[d.getMonth()]}</div><div class="day">${d.getDate()}</div><div class="weekday">${days[d.getDay()]}요일</div>
        </div>
        <div class="s-card-info">
          <div class="s-card-name">${name}</div>
          <div class="s-card-time">🧹 ${checkoutTime} ~ ${checkinTime}</div>
          ${s.staff ? `<div style="font-size:13px;color:var(--text-light);">👤 ${s.staff}</div>` : ''}
        </div>
        <button class="done-btn ${isDone?'done':'pending'}" onclick="staffToggle('${id}','clean','${s.status}')">
          ${isDone?'✅ 완료':'⏳ 대기'}</button>
      </div>`;
    } else {
      return `<div class="s-card ${isToday?'is-today-checkin':''} ${isDone?'is-done':''}">
        <div class="s-date-block" style="background:${isDone?'#ccc':'#4F46E5'}">
          <div class="month">${months[d.getMonth()]}</div><div class="day">${d.getDate()}</div><div class="weekday">${days[d.getDay()]}요일</div>
        </div>
        <div class="s-card-info">
          <div class="s-card-name">${name}</div>
          <div class="s-card-time-blue">🛎️ ${checkinTime}까지</div>
          <div class="s-towel">🛁 수건 ${s.towels||2}개</div>
        </div>
        <div class="s-right">
          <button class="done-btn ${isDone?'done':'pending'}" onclick="staffToggle('${id}','checkin','${s.status}')">
            ${isDone?'✅ 완료':'⏳ 대기'}</button>
          <span style="font-size:12px;color:var(--text-light);">👥 ${s.guests||1}명 / ${s.nights||1}박</span>
        </div>
      </div>`;
    }
  }).join('');
}

window.staffToggle = async function(id, type, current) {
  const newStatus = current === 'done' ? 'pending' : 'done';
  await update(ref(db, `${type === 'clean' ? 'schedules' : 'checkins'}/${id}`), { status: newStatus });
};

// ===== 관리자 기능 =====
window.switchTab = function(tab) {
  currentTab = tab;
  document.getElementById('section-clean').style.display   = tab === 'clean' ? '' : 'none';
  document.getElementById('section-checkin').style.display = tab === 'checkin' ? '' : 'none';
  const tc = document.getElementById('tab-clean');
  const ti = document.getElementById('tab-checkin');
  tc.style.color = tab==='clean'?'var(--airbnb)':'var(--text-light)';
  tc.style.borderBottom = tab==='clean'?'3px solid var(--airbnb)':'3px solid transparent';
  tc.style.fontWeight = tab==='clean'?'700':'600';
  ti.style.color = tab==='checkin'?'var(--airbnb)':'var(--text-light)';
  ti.style.borderBottom = tab==='checkin'?'3px solid var(--airbnb)':'3px solid transparent';
  ti.style.fontWeight = tab==='checkin'?'700':'600';
};

window.toggleSelectMode = function() {
  selectMode = !selectMode;
  selectedIds.clear();
  const btn = document.getElementById('selectModeBtn');
  const bar = document.getElementById('selectBar');
  btn.classList.toggle('active', selectMode);
  btn.textContent = selectMode ? '✕ 취소' : '☑️ 선택';
  bar.classList.toggle('visible', selectMode);
  updateSelectCount();
  renderSchedules();
};

window.selectAll = function() {
  document.querySelectorAll('.schedule-card[data-id]').forEach(card => {
    selectedIds.add(card.dataset.id);
    card.classList.add('selected');
    const cb = card.querySelector('.card-checkbox');
    if (cb) cb.textContent = '✓';
  });
  updateSelectCount();
};
window.deselectAll = function() {
  selectedIds.clear();
  document.querySelectorAll('.schedule-card').forEach(card => {
    card.classList.remove('selected');
    const cb = card.querySelector('.card-checkbox');
    if (cb) cb.textContent = '';
  });
  updateSelectCount();
};
window.toggleSelect = function(id, card) {
  if (!selectMode) return;
  if (selectedIds.has(id)) { selectedIds.delete(id); card.classList.remove('selected'); card.querySelector('.card-checkbox').textContent = ''; }
  else { selectedIds.add(id); card.classList.add('selected'); card.querySelector('.card-checkbox').textContent = '✓'; }
  updateSelectCount();
};
window.updateSelectCount = function() { document.getElementById('selectCount').textContent = `${selectedIds.size}개 선택됨`; };
window.deleteSelected = async function() {
  if (!selectedIds.size) { alert('선택된 일정이 없어요'); return; }
  if (!confirm(`${selectedIds.size}개 일정을 삭제할까요?`)) return;
  const ids = [...selectedIds];
  await Promise.all(ids.map(id => remove(ref(db, `schedules/${id}`))));
  selectedIds.clear(); updateSelectCount();
  alert(`✅ ${ids.length}개 삭제 완료`);
};

window.addSchedule = async function() {
  const propertyId = document.getElementById('scheduleProperty').value;
  const date = document.getElementById('scheduleDate').value;
  const checkin = document.getElementById('scheduleCheckin').value;
  const staff = document.getElementById('scheduleStaff').value;
  const memo = document.getElementById('scheduleMemo').value || '에어비앤비 자동생성';
  const priority = document.getElementById('schedulePriority').value;
  if (!propertyId || !date) { alert('숙소와 날짜를 입력해주세요'); return; }
  const exists = Object.values(schedules).some(s => s.propertyId === propertyId && s.date === date);
  if (exists) { alert('같은 숙소, 같은 날짜 일정이 이미 있어요'); return; }
  await push(ref(db, 'schedules'), { propertyId, date, checkin, staff, memo, priority, status:'pending', createdAt: new Date().toISOString() });
  closeModal('addModal');
};

window.addProperty = async function() {
  const name = document.getElementById('newPropertyName').value.trim();
  const region = document.getElementById('newPropertyRegion').value;
  const airbnbName = document.getElementById('newPropertyAirbnb').value.trim();
  if (!name) { alert('표시 이름을 입력해주세요'); return; }
  await push(ref(db, 'properties'), { name, region, airbnbName, createdAt: new Date().toISOString() });
  document.getElementById('newPropertyName').value = '';
  document.getElementById('newPropertyAirbnb').value = '';
};

window.deleteProperty = async function(id) {
  if (!confirm('숙소를 삭제할까요?')) return;
  await remove(ref(db, `properties/${id}`));
};

window.openDetail = function(id) {
  const s = schedules[id];
  const p = properties[s.propertyId];
  const region = p?.region || '기타';
  const isHapjeong = region === '합정역';
  const checkoutTime = isHapjeong ? '12:00' : '11:00';
  const checkinTime  = isHapjeong ? '16:00' : '15:00';
  document.getElementById('detailTitle').textContent = p?.name || '상세 정보';
  document.getElementById('detailContent').innerHTML = `
    <div style="display:grid;gap:12px;">
      <div style="background:#fff0f2;padding:14px;border-radius:12px;text-align:center;">
        <div style="font-size:13px;color:#FF385C;font-weight:700;">🧹 청소 가능 시간</div>
        <div style="font-size:20px;font-weight:700;margin-top:4px;">${checkoutTime} ~ ${checkinTime}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="background:#f7f7f7;padding:16px;border-radius:12px;"><div style="font-size:12px;color:#717171;margin-bottom:4px;">청소일</div><div style="font-weight:600;">${s.date}</div></div>
        <div style="background:#f7f7f7;padding:16px;border-radius:12px;"><div style="font-size:12px;color:#717171;margin-bottom:4px;">다음 체크인</div><div style="font-weight:600;">${s.checkin || '-'}</div></div>
      </div>
      <div style="background:#f7f7f7;padding:16px;border-radius:12px;"><div style="font-size:12px;color:#717171;margin-bottom:4px;">담당자</div>
        <input type="text" class="form-input" id="editStaff" value="${s.staff || ''}" placeholder="담당자 입력" style="margin-top:4px;"></div>
      <div style="background:#f7f7f7;padding:16px;border-radius:12px;"><div style="font-size:12px;color:#717171;margin-bottom:4px;">메모</div><div style="font-weight:600;">${s.memo || '-'}</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button onclick="updateStatus('${id}','done')" class="btn btn-primary" style="padding:14px;">✅ 완료</button>
        <button onclick="updateStatus('${id}','pending')" class="btn btn-outline" style="padding:14px;">⏳ 대기</button>
      </div>
      <button onclick="saveStaff('${id}')" class="btn btn-outline" style="padding:12px;">👤 담당자 저장</button>
      <button onclick="deleteSchedule('${id}')" style="background:none;border:none;color:#FF385C;cursor:pointer;font-size:14px;font-weight:600;padding:8px;">🗑️ 일정 삭제</button>
    </div>`;
  document.getElementById('detailModal').classList.add('open');
};

window.openCheckinDetail = function(id) {
  const s = checkins[id];
  const p = properties[s.propertyId];
  const region = p?.region || '기타';
  const isHapjeong = region === '합정역';
  const checkinTime = isHapjeong ? '16:00' : '15:00';
  document.getElementById('detailTitle').textContent = p?.name || '체크인 상세';
  document.getElementById('detailContent').innerHTML = `
    <div style="display:grid;gap:12px;">
      <div style="background:#EEF2FF;padding:14px;border-radius:12px;text-align:center;">
        <div style="font-size:13px;color:#4F46E5;font-weight:700;">🛎️ 체크인 마감</div>
        <div style="font-size:24px;font-weight:700;margin-top:4px;">${checkinTime}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="background:#f7f7f7;padding:16px;border-radius:12px;"><div style="font-size:12px;color:#717171;margin-bottom:4px;">체크인 날짜</div><div style="font-weight:600;">${s.date}</div></div>
        <div style="background:#f7f7f7;padding:16px;border-radius:12px;"><div style="font-size:12px;color:#717171;margin-bottom:4px;">게스트</div><div style="font-weight:600;">${s.guests||1}명 / ${s.nights||1}박</div></div>
      </div>
      <div style="background:#FFF3CD;padding:16px;border-radius:12px;text-align:center;">
        <div style="font-size:13px;color:#856404;font-weight:700;">🛁 수건 준비</div>
        <div style="font-size:32px;font-weight:700;color:#856404;margin-top:4px;">${s.towels||2}개</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <button onclick="updateCheckinStatus('${id}','done')" class="btn btn-primary" style="padding:14px;">✅ 완료</button>
        <button onclick="updateCheckinStatus('${id}','pending')" class="btn btn-outline" style="padding:14px;">⏳ 대기</button>
      </div>
      <button onclick="deleteCheckin('${id}')" style="background:none;border:none;color:#FF385C;cursor:pointer;font-size:14px;font-weight:600;padding:8px;">🗑️ 일정 삭제</button>
    </div>`;
  document.getElementById('detailModal').classList.add('open');
};

window.saveStaff = async function(id) { await update(ref(db, `schedules/${id}`), { staff: document.getElementById('editStaff').value }); alert('저장됐어요!'); };
window.updateStatus = async function(id, status) { await update(ref(db, `schedules/${id}`), { status }); closeModal('detailModal'); };
window.updateCheckinStatus = async function(id, status) { await update(ref(db, `checkins/${id}`), { status }); closeModal('detailModal'); };
window.deleteSchedule = async function(id) { if (!confirm('일정을 삭제할까요?')) return; await remove(ref(db, `schedules/${id}`)); closeModal('detailModal'); };
window.deleteCheckin = async function(id) { if (!confirm('체크인 일정을 삭제할까요?')) return; await remove(ref(db, `checkins/${id}`)); closeModal('detailModal'); };

window.filterStatus = function(status, btn) { currentStatus = status; document.querySelectorAll('.filter-tabs .tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderSchedules(); };
window.filterRegion = function(region, btn) { currentRegion = region; document.querySelectorAll('#section-clean .region-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderSchedules(); updateStats(); };
window.filterCheckinRegion = function(region, btn) { currentCheckinRegion = region; document.querySelectorAll('#section-checkin .region-tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderCheckins(); };
window.filterCheckinStatus = function(status, btn) { currentCheckinStatus = status; document.querySelectorAll('#section-checkin .filter-tabs .tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderCheckins(); };
window.clearFilters = function() {
  currentStatus = 'all'; currentRegion = 'all';
  document.getElementById('dateFilter').value = '';
  document.querySelectorAll('.filter-tabs .tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.filter-tabs .tab').classList.add('active');
  document.querySelectorAll('#section-clean .region-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('#section-clean .region-tab').classList.add('active');
  renderSchedules(); updateStats();
};
window.openAddModal = function() { document.getElementById('scheduleDate').value = new Date().toISOString().split('T')[0]; document.getElementById('addModal').classList.add('open'); };
window.openPropertyModal = function() { document.getElementById('propertyModal').classList.add('open'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); };

document.querySelectorAll('.modal-overlay').forEach(el => {
  let mouseDownTarget = null;
  el.addEventListener('mousedown', e => { mouseDownTarget = e.target; });
  el.addEventListener('click', e => { if (e.target === el && mouseDownTarget === el) el.classList.remove('open'); });
});
</script>
</body>
</html>
