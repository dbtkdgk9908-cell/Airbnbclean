<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF385C">
<title>청소 관리</title>
<link rel="manifest" id="manifestLink">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--red:#FF385C;--red-dk:#D93B55;--blue:#4F46E5;--bg:#F5F5F7;--card:#fff;--text:#1A1A1A;--sub:#6B6B6B;--border:#E8E8E8;--sh:0 1px 8px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);--r:16px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.page{display:none}

/* LOGIN */
#loginWrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FF385C,#C0113A)}
.login-icon{font-size:56px;margin-bottom:8px}
.login-title{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.5px}
.login-sub{font-size:14px;color:rgba(255,255,255,.75);margin-top:4px;margin-bottom:36px}
.login-card{background:#fff;border-radius:24px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:1px;margin-bottom:10px}
.role-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.role-btn{padding:14px 4px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;color:var(--sub);transition:all .15s;text-align:center;line-height:1.4}
.role-btn .re{font-size:20px;display:block;margin-bottom:3px}
.role-btn.active{border-color:var(--red);color:var(--red);background:#FFF5F6}
.pw-input{width:100%;padding:16px 18px;border:2px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;outline:none;background:#FAFAFA;margin-bottom:16px;transition:border-color .2s}
.pw-input:focus{border-color:var(--red);background:#fff}
.login-btn{width:100%;padding:17px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.login-btn:active{background:var(--red-dk)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.header-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--red);color:#fff}
.icon-btn{width:40px;height:40px;border-radius:12px;border:none;background:#F5F5F7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}

/* DROPDOWN */
.dropdown{display:none;position:fixed;top:56px;right:12px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.15);z-index:200;overflow:hidden;min-width:180px;border:1px solid var(--border)}
.dropdown.open{display:block}
.dd-item{width:100%;padding:15px 18px;background:none;border:none;text-align:left;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:10px;transition:background .1s;border-bottom:1px solid var(--border)}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:#F5F5F7}
.dd-item.danger{color:var(--red)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px}
.stat-card{background:var(--card);border-radius:var(--r);padding:18px 16px;box-shadow:var(--sh)}
.stat-num{font-size:32px;font-weight:900;color:var(--red);line-height:1;letter-spacing:-1px}
.stat-lbl{font-size:12px;color:var(--sub);font-weight:500;margin-top:4px}

/* TABS */
.tab-bar{display:flex;background:var(--card);padding:4px;margin:0 16px 16px;border-radius:12px;gap:4px;box-shadow:var(--sh)}
.tab-btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--sub);background:transparent;transition:all .2s}
.tab-btn.active{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(255,56,92,.3)}

/* FILTERS */
.filter-row{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;font-family:inherit;color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-chip.active{border-color:var(--red);color:var(--red);background:#FFF5F6}
.status-bar{display:flex;align-items:center;gap:8px;padding:0 16px 12px;flex-wrap:wrap}
.status-tabs{display:flex;background:#F0F0F0;border-radius:10px;padding:3px;gap:2px}
.status-tab{padding:7px 14px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:600;font-family:inherit;color:var(--sub);cursor:pointer}
.status-tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.date-input{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-family:inherit;color:var(--text);outline:none}
.clear-btn{padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;font-family:inherit;color:var(--sub);cursor:pointer}

/* SELECT BAR */
.sel-bar{display:none;margin:0 16px 12px;background:var(--red);border-radius:12px;padding:12px 16px;align-items:center;justify-content:space-between}
.sel-bar.on{display:flex}
.sel-count{font-size:14px;font-weight:700;color:#fff}
.sel-action{padding:7px 12px;border-radius:8px;border:none;background:rgba(255,255,255,.25);color:#fff;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-left:6px}
.del-action{padding:7px 14px;border-radius:8px;border:none;background:#fff;color:var(--red);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}

/* CARDS */
.list-wrap{padding:0 16px;display:grid;gap:10px;padding-bottom:100px}
.s-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;border:2px solid transparent;transition:border-color .15s;cursor:pointer;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.s-card.today-c{border-color:var(--red)}
.s-card.today-ci{border-color:var(--blue)}
.s-card.done{opacity:.5}
.s-card.selected{border-color:var(--red);background:#FFF5F6}
.date-pill{border-radius:12px;padding:10px;text-align:center;min-width:52px;flex-shrink:0;color:#fff}
.dp-m{font-size:10px;font-weight:700;opacity:.85}
.dp-d{font-size:22px;font-weight:900;line-height:1}
.dp-w{font-size:10px;opacity:.85}
.s-info{flex:1;min-width:0}
.s-name{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-time{font-size:12px;font-weight:600;margin-bottom:2px}
.s-meta{font-size:12px;color:var(--sub)}
.reg-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:4px}
.rp-합정역{background:#FEF3C7;color:#92400E}
.rp-공덕역{background:#DBEAFE;color:#1E40AF}
.rp-서울역{background:#D1FAE5;color:#065F46}
.rp-기타{background:#F3F4F6;color:#374151}
.s-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.sp{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700}
.sp-p{background:#FFF3CD;color:#92400E}
.sp-d{background:#D1FAE5;color:#065F46}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;background:#fff}
.cb.on{background:var(--red);border-color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .ei{font-size:40px;margin-bottom:12px}
.empty p{font-size:15px;font-weight:600;color:var(--text)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:900;margin-bottom:20px;letter-spacing:-.3px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.5px;margin-bottom:8px}
.fi{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;outline:none;background:#FAFAFA;transition:border-color .2s}
.fi:focus{border-color:var(--red);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.submit-btn{width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px}
.outline-btn{width:100%;padding:14px;background:#fff;color:var(--text);border:2px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
.danger-btn{background:none;border:none;color:var(--red);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;padding:12px;width:100%}
.detail-box{background:#F8F8F8;border-radius:12px;padding:16px;margin-bottom:10px}
.dl{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;margin-bottom:4px}
.dv{font-size:15px;font-weight:700}
.hl{border-radius:12px;padding:16px;text-align:center;margin-bottom:10px}
.hl-l{font-size:12px;font-weight:700;margin-bottom:4px}
.hl-v{font-size:28px;font-weight:900}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.sec-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:1px;margin:16px 0 8px}
.prop-row{background:#F8F8F8;border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px;margin-bottom:8px}

/* STAFF */
.today-banner{margin:16px;border-radius:20px;padding:20px;background:linear-gradient(135deg,var(--red),var(--red-dk));color:#fff}
.tb-lbl{font-size:12px;font-weight:700;opacity:.8;margin-bottom:2px}
.tb-count{font-size:44px;font-weight:900;line-height:1;letter-spacing:-2px}
.tb-count span{font-size:18px;font-weight:500;opacity:.8}
.tb-sec{font-size:11px;font-weight:700;opacity:.7;margin:12px 0 6px;letter-spacing:1px}
.tb-card{background:rgba(255,255,255,.15);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tb-name{font-size:15px;font-weight:700}
.tb-time{font-size:12px;opacity:.85;margin-top:2px}
.tb-btn{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:700;border:none;font-family:inherit;cursor:pointer}
.tb-btn.pending{background:rgba(255,255,255,.2);color:#fff}
.tb-btn.done{background:#fff;color:var(--red)}
.week-scroll{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.week-scroll::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;padding:10px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;text-align:center;min-width:60px;transition:all .15s}
.day-pill .dn{font-size:11px;color:var(--sub);font-weight:600;display:block}
.day-pill .dd{font-size:18px;font-weight:900;display:block;color:var(--text)}
.day-pill.tp{border-color:var(--red)}
.day-pill.tp .dn,.day-pill.tp .dd{color:var(--red)}
.day-pill.sel{background:var(--red);border-color:var(--red)}
.day-pill.sel .dn,.day-pill.sel .dd{color:#fff}
.done-toggle{padding:10px 16px;border-radius:20px;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.done-toggle.pending{background:#FFF3CD;color:#92400E}
.done-toggle.done{background:#D1FAE5;color:#065F46}

/* INSTALL */
#installBanner{display:none;position:fixed;bottom:16px;left:12px;right:12px;background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 4px 24px rgba(0,0,0,.15);z-index:400;align-items:center;gap:12px;border:1px solid var(--border)}
</style>
</head>
<body>

<div id="installBanner">
  <span style="font-size:32px">🧹</span>
  <div style="flex:1"><div style="font-size:14px;font-weight:700">앱으로 설치하기</div><div style="font-size:12px;color:#6B6B6B;margin-top:1px">홈 화면에 추가하면 더 편해요</div></div>
  <button onclick="installApp()" style="padding:8px 16px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">설치</button>
  <button onclick="dismissInstall()" style="background:none;border:none;font-size:20px;color:#6B6B6B;cursor:pointer;padding:4px">×</button>
</div>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-icon">🧹</div>
  <div class="login-title">청소 관리</div>
  <div class="login-sub">역할을 선택하고 로그인하세요</div>
  <div class="login-card">
    <div class="lbl">역할 선택</div>
    <div class="role-grid">
      <button class="role-btn" onclick="selectRole('admin',this)"><span class="re">⚙️</span>관리자</button>
      <button class="role-btn" onclick="selectRole('합정역',this)"><span class="re">🟡</span>합정역</button>
      <button class="role-btn" onclick="selectRole('공덕역',this)"><span class="re">🔵</span>공덕역</button>
      <button class="role-btn" onclick="selectRole('서울역',this)"><span class="re">🟢</span>서울역</button>
    </div>
    <div class="lbl">비밀번호</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">역할을 선택하거나 비밀번호가 틀렸어요</div>
  </div>
</div>

<!-- ADMIN -->
<div class="page" id="adminPage">
  <header class="app-header">
    <div class="header-title">🧹 청소 관리 <span class="header-badge">관리자</span></div>
    <button class="icon-btn" onclick="toggleDD()" id="menuBtn">☰</button>
  </header>
  <div class="dropdown" id="adminDD">
    <button class="dd-item" onclick="openAddModal();toggleDD()">➕ 일정 추가</button>
    <button class="dd-item" onclick="openPropertyModal();toggleDD()">🏠 숙소 관리</button>
    <button class="dd-item" onclick="toggleSelMode();toggleDD()">☑️ 선택 모드</button>
    <button class="dd-item danger" onclick="doLogout()">🚪 로그아웃</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="stat-today">0</div><div class="stat-lbl">오늘 청소</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pending">0</div><div class="stat-lbl">대기중</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">완료</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-props">0</div><div class="stat-lbl">등록 숙소</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-clean" onclick="switchTab('clean')">🧹 청소</button>
    <button class="tab-btn" id="tab-ci" onclick="switchTab('checkin')">🛎️ 체크인</button>
  </div>
  <div id="sec-clean">
    <div class="filter-row">
      <button class="filter-chip active" onclick="fReg('all',this)">전체</button>
      <button class="filter-chip" onclick="fReg('합정역',this)">🟡 합정역</button>
      <button class="filter-chip" onclick="fReg('공덕역',this)">🔵 공덕역</button>
      <button class="filter-chip" onclick="fReg('서울역',this)">🟢 서울역</button>
    </div>
    <div class="status-bar">
      <div class="status-tabs">
        <button class="status-tab active" onclick="fStat('all',this)">전체</button>
        <button class="status-tab" onclick="fStat('pending',this)">대기</button>
        <button class="status-tab" onclick="fStat('done',this)">완료</button>
      </div>
      <input type="date" class="date-input" id="dateFilter" onchange="renderS()">
      <button class="clear-btn" onclick="clearF()">초기화</button>
    </div>
    <div class="sel-bar" id="selBar">
      <div style="display:flex;align-items:center">
        <span class="sel-count" id="selCount">0개</span>
        <button class="sel-action" onclick="selAll()">전체</button>
        <button class="sel-action" onclick="deselAll()">해제</button>
      </div>
      <button class="del-action" onclick="delSel()">🗑️ 삭제</button>
    </div>
    <div class="list-wrap" id="scheduleList"></div>
  </div>
  <div id="sec-ci" style="display:none">
    <div class="filter-row">
      <button class="filter-chip active" onclick="fCIReg('all',this)">전체</button>
      <button class="filter-chip" onclick="fCIReg('합정역',this)">🟡 합정역</button>
      <button class="filter-chip" onclick="fCIReg('공덕역',this)">🔵 공덕역</button>
      <button class="filter-chip" onclick="fCIReg('서울역',this)">🟢 서울역</button>
    </div>
    <div class="status-bar">
      <div class="status-tabs">
        <button class="status-tab active" onclick="fCIStat('all',this)">전체</button>
        <button class="status-tab" onclick="fCIStat('pending',this)">대기</button>
        <button class="status-tab" onclick="fCIStat('done',this)">완료</button>
      </div>
      <input type="date" class="date-input" id="ciDateFilter" onchange="renderCI()">
    </div>
    <div class="list-wrap" id="checkinList"></div>
  </div>
</div>

<!-- STAFF -->
<div class="page" id="staffPage">
  <header class="app-header">
    <div class="header-title">🧹 청소 일정 <span class="header-badge" id="staffBadge"></span></div>
    <button class="icon-btn" onclick="doLogout()" style="font-size:13px;font-weight:700;color:#6B6B6B">나가기</button>
  </header>
  <div class="today-banner">
    <div class="tb-lbl">오늘 일정</div>
    <div class="tb-count"><span id="todayCount">0</span> <span>건</span></div>
    <div id="todayCards"></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="sTabC" onclick="sSwitchTab('clean')">🧹 청소</button>
    <button class="tab-btn" id="sTabCI" onclick="sSwitchTab('checkin')">🛎️ 체크인</button>
  </div>
  <div class="week-scroll" id="weekNav"></div>
  <div class="list-wrap" id="staffList"></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">청소 일정 추가</div>
    <div class="fg"><label class="fl">숙소</label><select class="fi" id="scheduleProperty"><option value="">숙소 선택</option></select></div>
    <div class="form-row">
      <div class="fg"><label class="fl">청소일</label><input type="date" class="fi" id="scheduleDate"></div>
      <div class="fg"><label class="fl">다음 체크인</label><input type="date" class="fi" id="scheduleCheckin"></div>
    </div>
    <div class="fg"><label class="fl">담당자</label><input type="text" class="fi" id="scheduleStaff" placeholder="담당자 이름"></div>
    <div class="fg"><label class="fl">메모</label><input type="text" class="fi" id="scheduleMemo" placeholder="메모"></div>
    <div class="fg"><label class="fl">우선순위</label><select class="fi" id="schedulePriority"><option value="normal">일반</option><option value="high">높음</option></select></div>
    <button class="submit-btn" onclick="addSchedule()">추가하기</button>
  </div>
</div>

<div class="modal-overlay" id="propertyModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">숙소 관리</div>
    <div class="fg"><label class="fl">표시 이름</label><input type="text" class="fi" id="newPropName" placeholder="공덕역 101호"></div>
    <div class="fg"><label class="fl">지역</label><select class="fi" id="newPropRegion"><option value="합정역">합정역</option><option value="공덕역">공덕역</option><option value="서울역">서울역</option><option value="기타">기타</option></select></div>
    <div class="fg"><label class="fl">에어비앤비 원본명</label><input type="text" class="fi" id="newPropAirbnb" placeholder="#1 공덕역 도보10분/..."></div>
    <button class="submit-btn" onclick="addProperty()">숙소 추가</button>
    <div class="divider"></div>
    <div class="sec-title">등록된 숙소</div>
    <div id="propertyList"></div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="detailTitle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, push, remove, update, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
const app = initializeApp({databaseURL:"https://airbnbclean-4c10f-default-rtdb.firebaseio.com"});
const db = getDatabase(app);
const PW={admin:'1234','합정역':'1234','공덕역':'1234','서울역':'1234'};
const M=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const D=['일','월','화','수','목','금','토'];
const todayStr=new Date().toISOString().split('T')[0];
let props={},scheds={},chkins={};
let curStat='all',curReg='all',curCIStat='all',curCIReg='all';
let curTab='clean',selMode=false,selIds=new Set();
let sReg='',sTab='clean',sDate=todayStr,role='';

// PWA
const mf={name:"청소 관리",short_name:"청소관리",start_url:".",display:"standalone",background_color:"#FF385C",theme_color:"#FF385C",orientation:"portrait",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%23FF385C'/><text y='140' x='96' text-anchor='middle' font-size='130'>🧹</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
document.getElementById('manifestLink').href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));
if('serviceWorker' in navigator)navigator.serviceWorker.register(URL.createObjectURL(new Blob([`const C='v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`],{type:'application/javascript'}))).catch(()=>{});
let dp;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('installBanner').style.display='flex';});
window.addEventListener('appinstalled',()=>document.getElementById('installBanner').style.display='none');
window.installApp=()=>{if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;document.getElementById('installBanner').style.display='none';})}};
window.dismissInstall=()=>document.getElementById('installBanner').style.display='none';

// Login
let selRole='';
window.selectRole=(r,btn)=>{selRole=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};
window.doLogin=()=>{
  const pw=document.getElementById('pwInput').value,err=document.getElementById('loginErr');
  if(!selRole||PW[selRole]!==pw){err.style.display='block';return;}
  err.style.display='none';role=selRole;
  document.getElementById('loginWrap').style.display='none';
  if(role==='admin'){document.getElementById('adminPage').style.display='block';}
  else{sReg=role;document.getElementById('staffBadge').textContent=role;document.getElementById('staffPage').style.display='block';}
  initFB();
};
window.doLogout=()=>{role='';selRole='';['loginWrap'].forEach(id=>document.getElementById(id).style.display=id==='loginWrap'?'flex':'none');document.getElementById('adminPage').style.display='none';document.getElementById('staffPage').style.display='none';document.getElementById('pwInput').value='';document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));};

// Dropdown
window.toggleDD=()=>document.getElementById('adminDD').classList.toggle('open');
document.addEventListener('click',e=>{const dd=document.getElementById('adminDD');if(dd?.classList.contains('open')&&!dd.contains(e.target)&&!e.target.closest('#menuBtn'))dd.classList.remove('open');});

// Firebase
let fbInit=false;
function initFB(){
  if(fbInit)return;fbInit=true;
  onValue(ref(db,'properties'),s=>{props=s.val()||{};window.properties=props;updateSel();renderPL();updateStats();renderS();renderCI();renderStaff();});
  onValue(ref(db,'schedules'),s=>{scheds=s.val()||{};window.schedules=scheds;renderS();updateStats();renderStaff();});
  onValue(ref(db,'checkins'),s=>{chkins=s.val()||{};renderCI();renderStaff();});
}

// Stats
window.updateStats=()=>{
  const all=Object.entries(scheds);
  const f=curReg==='all'?all:all.filter(([_,s])=>(props[s.propertyId]?.region||'기타')===curReg);
  const pc=curReg==='all'?Object.keys(props).length:Object.values(props).filter(p=>p.region===curReg).length;
  const vs=f.map(([_,s])=>s);
  document.getElementById('stat-today').textContent=vs.filter(s=>s.date===todayStr).length;
  document.getElementById('stat-pending').textContent=vs.filter(s=>s.status==='pending').length;
  document.getElementById('stat-done').textContent=vs.filter(s=>s.status==='done').length;
  document.getElementById('stat-props').textContent=pc;
};
window.updateSel=()=>{const o=Object.entries(props).map(([id,p])=>`<option value="${id}">${p.name} (${p.region||'기타'})</option>`).join('');document.getElementById('scheduleProperty').innerHTML='<option value="">숙소 선택</option>'+o;};
window.renderPL=()=>{
  const el=document.getElementById('propertyList');if(!el)return;
  const items=Object.entries(props);
  if(!items.length){el.innerHTML='<p style="color:#6B6B6B;text-align:center;padding:20px">등록된 숙소 없음</p>';return;}
  let h='';['합정역','공덕역','서울역','기타'].forEach(r=>{
    const ri=items.filter(([_,p])=>(p.region||'기타')===r);if(!ri.length)return;
    h+=`<div class="sec-title">${r}</div>`;
    h+=ri.map(([id,p])=>`<div class="prop-row"><div style="flex:1"><div style="font-size:14px;font-weight:700">${p.name}</div>${p.airbnbName?`<div style="font-size:11px;color:#6B6B6B;margin-top:2px">${p.airbnbName.substring(0,35)}...</div>`:''}</div><button onclick="delProp('${id}')" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:4px">×</button></div>`).join('');
  });
  el.innerHTML=h;
};

function cTime(reg){const h=reg==='합정역';return{out:h?'12:00':'11:00',ci:h?'16:00':'15:00'};}
function cardDate(dateStr,bg){const d=new Date(dateStr+'T00:00:00');return`<div class="date-pill" style="background:${bg}"><div class="dp-m">${M[d.getMonth()]}</div><div class="dp-d">${d.getDate()}</div><div class="dp-w">${D[d.getDay()]}요일</div></div>`;}

// Render schedules
window.renderS=()=>{
  const el=document.getElementById('scheduleList');if(!el)return;
  const df=document.getElementById('dateFilter')?.value;
  let items=Object.entries(scheds).filter(([_,s])=>s.date>=todayStr);
  if(curStat!=='all')items=items.filter(([_,s])=>s.status===curStat);
  if(curReg!=='all')items=items.filter(([_,s])=>(props[s.propertyId]?.region||'기타')===curReg);
  if(df)items=items.filter(([_,s])=>s.date===df);
  items.sort((a,b)=>a[1].date?.localeCompare(b[1].date));
  if(!items.length){el.innerHTML='<div class="empty"><div class="ei">🧹</div><p>청소 일정이 없어요</p></div>';return;}
  el.innerHTML=items.map(([id,s])=>{
    const p=props[s.propertyId],nm=p?.name||'알 수 없는 숙소',reg=p?.region||'기타';
    const t=cTime(reg),sel=selIds.has(id),isT=s.date===todayStr,isDone=s.status==='done';
    return`<div class="s-card ${isT?'today-c':''} ${isDone?'done':''} ${sel?'selected':''}" data-id="${id}" onclick="${selMode?`toggleSel('${id}',this)`:`openDetail('${id}')`}">
      ${selMode?`<div class="cb ${sel?'on':''}">${sel?'✓':''}</div>`:''}
      ${cardDate(s.date,isDone?'#CCC':'var(--red)')}
      <div class="s-info">
        <div class="reg-pill rp-${reg}">${reg}</div>
        <div class="s-name">${nm}</div>
        <div class="s-time" style="color:var(--red)">🧹 ${t.out} ~ ${t.ci}</div>
        ${s.staff?`<div class="s-meta">👤 ${s.staff}</div>`:''}
      </div>
      <div class="s-right">
        <span class="sp ${isDone?'sp-d':'sp-p'}">${isDone?'✅ 완료':'⏳ 대기'}</span>
        ${s.priority==='high'?'<span style="font-size:11px;color:#991B1B;font-weight:700">🔴 긴급</span>':''}
      </div>
    </div>`;
  }).join('');
};

// Render checkins
window.renderCI=()=>{
  const el=document.getElementById('checkinList');if(!el)return;
  const df=document.getElementById('ciDateFilter')?.value;
  let items=Object.entries(chkins).filter(([_,s])=>s.date>=todayStr);
  if(curCIStat!=='all')items=items.filter(([_,s])=>s.status===curCIStat);
  if(curCIReg!=='all')items=items.filter(([_,s])=>(props[s.propertyId]?.region||'기타')===curCIReg);
  if(df)items=items.filter(([_,s])=>s.date===df);
  items.sort((a,b)=>a[1].date?.localeCompare(b[1].date));
  if(!items.length){el.innerHTML='<div class="empty"><div class="ei">🛎️</div><p>체크인 일정이 없어요</p></div>';return;}
  el.innerHTML=items.map(([id,s])=>{
    const p=props[s.propertyId],nm=p?.name||'알 수 없음',reg=p?.region||'기타';
    const ci=reg==='합정역'?'16:00':'15:00',isT=s.date===todayStr,isDone=s.status==='done';
    return`<div class="s-card ${isT?'today-ci':''} ${isDone?'done':''}" onclick="openCIDetail('${id}')">
      ${cardDate(s.date,isDone?'#CCC':'#4F46E5')}
      <div class="s-info">
        <div class="reg-pill rp-${reg}">${reg}</div>
        <div class="s-name">${nm}</div>
        <div class="s-time" style="color:#4F46E5">🛎️ ${ci}까지</div>
        <div class="s-meta">👥 ${s.guests||1}명 / ${s.nights||1}박 · 🛁 수건 ${s.towels||2}개</div>
      </div>
      <div class="s-right"><span class="sp ${isDone?'sp-d':'sp-p'}">${isDone?'✅ 완료':'⏳ 대기'}</span></div>
    </div>`;
  }).join('');
};

// Staff
window.renderStaff=()=>{if(!sReg)return;renderTodayBanner();renderWeekNav();renderStaffList();};
function sProps(){return Object.entries(props).filter(([_,p])=>p.region===sReg).map(([id])=>id);}
function wkDates(){const a=[],t=new Date();for(let i=0;i<7;i++){const d=new Date(t);d.setDate(t.getDate()+i);a.push(d.toISOString().split('T')[0]);}return a;}
function renderTodayBanner(){
  const pids=sProps(),isH=sReg==='합정역',co=isH?'12:00':'11:00',ci=isH?'16:00':'15:00';
  const tc=Object.entries(scheds).filter(([_,s])=>s.date===todayStr&&pids.includes(s.propertyId));
  const tci=Object.entries(chkins).filter(([_,s])=>s.date===todayStr&&pids.includes(s.propertyId));
  document.getElementById('todayCount').textContent=tc.length+tci.length;
  const cH=tc.length?`<div class="tb-sec">🧹 청소</div>${tc.map(([id,s])=>`<div class="tb-card"><div><div class="tb-name">${props[s.propertyId]?.name||'알 수 없음'}</div><div class="tb-time">🧹 ${co} ~ ${ci}</div></div><button class="tb-btn ${s.status}" onclick="sToggle('${id}','clean','${s.status}')">${s.status==='done'?'✅ 완료':'⏳ 대기'}</button></div>`).join('')}`:'';
  const ciH=tci.length?`<div class="tb-sec">🛎️ 체크인</div>${tci.map(([id,s])=>`<div class="tb-card"><div><div class="tb-name">${props[s.propertyId]?.name||'알 수 없음'}</div><div class="tb-time">🛎️ ${ci}까지 · 🛁 수건 ${s.towels||2}개</div></div><button class="tb-btn ${s.status}" onclick="sToggle('${id}','checkin','${s.status}')">${s.status==='done'?'✅ 완료':'⏳ 대기'}</button></div>`).join('')}`:'';
  document.getElementById('todayCards').innerHTML=(cH+ciH)||'<div style="opacity:.7;font-size:14px;margin-top:12px">오늘 일정 없음</div>';
}
function renderWeekNav(){
  const el=document.getElementById('weekNav');if(!el)return;
  el.innerHTML=wkDates().map(d=>{
    const dt=new Date(d+'T00:00:00'),isT=d===todayStr,isSel=d===sDate;
    return`<button class="day-pill ${isSel?'sel':''} ${isT&&!isSel?'tp':''}" onclick="sSelDate('${d}')">
      <span class="dn">${D[dt.getDay()]}${isT?' 오늘':''}</span><span class="dd">${dt.getDate()}</span>
    </button>`;
  }).join('');
}
function renderStaffList(){
  const el=document.getElementById('staffList');if(!el)return;
  const pids=sProps(),isH=sReg==='합정역',co=isH?'12:00':'11:00',ci=isH?'16:00':'15:00';
  const src=sTab==='clean'?scheds:chkins;
  const items=Object.entries(src).filter(([_,s])=>pids.includes(s.propertyId)&&s.date===sDate);
  items.sort((a,b)=>a[1].date?.localeCompare(b[1].date));
  if(!items.length){el.innerHTML=`<div class="empty"><div class="ei">${sTab==='clean'?'🧹':'🛎️'}</div><p>이 날 일정이 없어요</p></div>`;return;}
  el.innerHTML=items.map(([id,s])=>{
    const p=props[s.propertyId],nm=p?.name||'알 수 없음',isT=s.date===todayStr,isDone=s.status==='done';
    if(sTab==='clean')return`<div class="s-card ${isT?'today-c':''} ${isDone?'done':''}">
      ${cardDate(s.date,isDone?'#CCC':'var(--red)')}
      <div class="s-info"><div class="s-name">${nm}</div><div class="s-time" style="color:var(--red)">🧹 ${co} ~ ${ci}</div>${s.staff?`<div class="s-meta">👤 ${s.staff}</div>`:''}</div>
      <button class="done-toggle ${s.status}" onclick="sToggle('${id}','clean','${s.status}')">${isDone?'✅ 완료':'⏳ 대기'}</button>
    </div>`;
    return`<div class="s-card ${isT?'today-ci':''} ${isDone?'done':''}">
      ${cardDate(s.date,isDone?'#CCC':'#4F46E5')}
      <div class="s-info"><div class="s-name">${nm}</div><div class="s-time" style="color:#4F46E5">🛎️ ${ci}까지</div><div style="font-size:20px;font-weight:900;color:#92400E;margin-top:4px">🛁 수건 ${s.towels||2}개</div></div>
      <div class="s-right"><button class="done-toggle ${s.status}" onclick="sToggle('${id}','checkin','${s.status}')">${isDone?'✅ 완료':'⏳ 대기'}</button><span class="s-meta" style="margin-top:4px">👥 ${s.guests||1}명/${s.nights||1}박</span></div>
    </div>`;
  }).join('');
}
window.sSwitchTab=t=>{sTab=t;document.getElementById('sTabC').classList.toggle('active',t==='clean');document.getElementById('sTabCI').classList.toggle('active',t==='checkin');renderStaff();};
window.sSelDate=d=>{sDate=d;renderWeekNav();renderStaffList();};
window.sToggle=async(id,type,cur)=>await update(ref(db,`${type==='clean'?'schedules':'checkins'}/${id}`),{status:cur==='done'?'pending':'done'});

// Filters
window.switchTab=t=>{curTab=t;document.getElementById('sec-clean').style.display=t==='clean'?'':'none';document.getElementById('sec-ci').style.display=t==='checkin'?'':'none';document.getElementById('tab-clean').classList.toggle('active',t==='clean');document.getElementById('tab-ci').classList.toggle('active',t==='checkin');};
window.fReg=(r,btn)=>{curReg=r;document.querySelectorAll('#sec-clean .filter-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderS();updateStats();};
window.fStat=(s,btn)=>{curStat=s;document.querySelectorAll('#sec-clean .status-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderS();};
window.fCIReg=(r,btn)=>{curCIReg=r;document.querySelectorAll('#sec-ci .filter-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCI();};
window.fCIStat=(s,btn)=>{curCIStat=s;document.querySelectorAll('#sec-ci .status-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCI();};
window.clearF=()=>{curStat='all';curReg='all';document.getElementById('dateFilter').value='';document.querySelector('#sec-clean .filter-chip').click();document.querySelector('#sec-clean .status-tab').click();};

// Select mode
window.toggleSelMode=()=>{selMode=!selMode;selIds.clear();document.getElementById('selBar').classList.toggle('on',selMode);updateSelCount();renderS();};
window.selAll=()=>{document.querySelectorAll('.s-card[data-id]').forEach(c=>{selIds.add(c.dataset.id);c.classList.add('selected');const cb=c.querySelector('.cb');if(cb){cb.classList.add('on');cb.textContent='✓';}});updateSelCount();};
window.deselAll=()=>{selIds.clear();document.querySelectorAll('.s-card').forEach(c=>{c.classList.remove('selected');const cb=c.querySelector('.cb');if(cb){cb.classList.remove('on');cb.textContent='';}});updateSelCount();};
window.toggleSel=(id,card)=>{if(!selMode)return;if(selIds.has(id)){selIds.delete(id);card.classList.remove('selected');const cb=card.querySelector('.cb');if(cb){cb.classList.remove('on');cb.textContent='';}}else{selIds.add(id);card.classList.add('selected');const cb=card.querySelector('.cb');if(cb){cb.classList.add('on');cb.textContent='✓';}}updateSelCount();};
window.updateSelCount=()=>document.getElementById('selCount').textContent=`${selIds.size}개`;
window.delSel=async()=>{if(!selIds.size){alert('선택된 일정이 없어요');return;}if(!confirm(`${selIds.size}개 삭제할까요?`))return;await Promise.all([...selIds].map(id=>remove(ref(db,`schedules/${id}`))));selIds.clear();updateSelCount();};

// CRUD
window.addSchedule=async()=>{
  const pid=document.getElementById('scheduleProperty').value,date=document.getElementById('scheduleDate').value;
  if(!pid||!date){alert('숙소와 날짜를 입력해주세요');return;}
  if(Object.values(scheds).some(s=>s.propertyId===pid&&s.date===date)){alert('이미 등록된 일정이에요');return;}
  await push(ref(db,'schedules'),{propertyId:pid,date,checkin:document.getElementById('scheduleCheckin').value,staff:document.getElementById('scheduleStaff').value,memo:document.getElementById('scheduleMemo').value||'수동 등록',priority:document.getElementById('schedulePriority').value,status:'pending',createdAt:new Date().toISOString()});
  closeModal('addModal');
};
window.addProperty=async()=>{
  const name=document.getElementById('newPropName').value.trim();
  if(!name){alert('표시 이름을 입력해주세요');return;}
  await push(ref(db,'properties'),{name,region:document.getElementById('newPropRegion').value,airbnbName:document.getElementById('newPropAirbnb').value.trim(),createdAt:new Date().toISOString()});
  document.getElementById('newPropName').value='';document.getElementById('newPropAirbnb').value='';
};
window.delProp=async id=>{if(!confirm('숙소를 삭제할까요?'))return;await remove(ref(db,`properties/${id}`));};

window.openDetail=id=>{
  const s=scheds[id],p=props[s.propertyId],reg=p?.region||'기타',t=cTime(reg);
  document.getElementById('detailTitle').textContent=p?.name||'상세 정보';
  document.getElementById('detailContent').innerHTML=`
    <div class="hl" style="background:#FFF5F6"><div class="hl-l" style="color:var(--red)">🧹 청소 가능 시간</div><div class="hl-v" style="color:var(--red)">${t.out} ~ ${t.ci}</div></div>
    <div class="grid2">
      <div class="detail-box"><div class="dl">청소일</div><div class="dv">${s.date}</div></div>
      <div class="detail-box"><div class="dl">다음 체크인</div><div class="dv">${s.checkin||'-'}</div></div>
    </div>
    <div class="detail-box" style="margin-bottom:10px"><div class="dl">담당자</div><input type="text" class="fi" id="editStaff" value="${s.staff||''}" placeholder="담당자 입력" style="margin-top:8px"></div>
    <div class="detail-box" style="margin-bottom:16px"><div class="dl">메모</div><div class="dv" style="font-weight:500;margin-top:4px">${s.memo||'-'}</div></div>
    <div class="grid2">
      <button class="submit-btn" onclick="updStat('${id}','done')">✅ 완료</button>
      <button class="outline-btn" onclick="updStat('${id}','pending')">⏳ 대기</button>
    </div>
    <button class="outline-btn" style="margin-top:8px" onclick="saveStaff('${id}')">👤 담당자 저장</button>
    <button class="danger-btn" onclick="delSched('${id}')">🗑️ 일정 삭제</button>`;
  document.getElementById('detailModal').classList.add('open');
};
window.openCIDetail=id=>{
  const s=chkins[id],p=props[s.propertyId],reg=p?.region||'기타',ci=reg==='합정역'?'16:00':'15:00';
  document.getElementById('detailTitle').textContent=p?.name||'체크인 상세';
  document.getElementById('detailContent').innerHTML=`
    <div class="hl" style="background:#EEF2FF"><div class="hl-l" style="color:#4F46E5">🛎️ 체크인 마감</div><div class="hl-v" style="color:#4F46E5">${ci}</div></div>
    <div class="grid2">
      <div class="detail-box"><div class="dl">날짜</div><div class="dv">${s.date}</div></div>
      <div class="detail-box"><div class="dl">게스트</div><div class="dv">${s.guests||1}명 / ${s.nights||1}박</div></div>
    </div>
    <div class="hl" style="background:#FFF3CD;margin-bottom:16px"><div class="hl-l" style="color:#92400E">🛁 수건 준비</div><div class="hl-v" style="color:#92400E;font-size:40px">${s.towels||2}개</div></div>
    <div class="grid2">
      <button class="submit-btn" onclick="updCI('${id}','done')">✅ 완료</button>
      <button class="outline-btn" onclick="updCI('${id}','pending')">⏳ 대기</button>
    </div>
    <button class="danger-btn" onclick="delCI('${id}')">🗑️ 일정 삭제</button>`;
  document.getElementById('detailModal').classList.add('open');
};
window.saveStaff=async id=>{await update(ref(db,`schedules/${id}`),{staff:document.getElementById('editStaff').value});alert('저장됐어요!');};
window.updStat=async(id,s)=>{await update(ref(db,`schedules/${id}`),{status:s});closeModal('detailModal');};
window.updCI=async(id,s)=>{await update(ref(db,`checkins/${id}`),{status:s});closeModal('detailModal');};
window.delSched=async id=>{if(!confirm('삭제할까요?'))return;await remove(ref(db,`schedules/${id}`));closeModal('detailModal');};
window.delCI=async id=>{if(!confirm('삭제할까요?'))return;await remove(ref(db,`checkins/${id}`));closeModal('detailModal');};
window.openAddModal=()=>{document.getElementById('scheduleDate').value=todayStr;document.getElementById('addModal').classList.add('open');};
window.openPropertyModal=()=>document.getElementById('propertyModal').classList.add('open');
window.closeModal=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-overlay').forEach(el=>{let md=null;el.addEventListener('mousedown',e=>md=e.target);el.addEventListener('click',e=>{if(e.target===el&&md===el)el.classList.remove('open');});});
</script>
</body>
</html>
